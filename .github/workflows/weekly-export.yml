name: Weekly JSON Export

on:
  schedule:
    # Every Monday at 06:00 UTC
    - cron: "0 6 * * 1"
  workflow_dispatch:  # allow manual runs from the GitHub Actions tab

jobs:
  export:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run export
        env:
          DATABRICKS_HOST: ${{ secrets.DATABRICKS_HOST }}
          DATABRICKS_HTTP_PATH: ${{ secrets.DATABRICKS_HTTP_PATH }}
          DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_TOKEN }}
        run: python export_json.py

      - name: Commit and push data to `data` branch
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Switch to (or create) the data branch, keeping only the data/ folder
          git checkout --orphan data-branch-temp
          git rm -rf --cached . > /dev/null
          git add -f data/
          git commit -m "chore: weekly data export $(date -u +'%Y-%m-%d')"

          # Force-push to the `data` branch
          git push origin HEAD:data --force
